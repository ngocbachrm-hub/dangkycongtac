<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch Công Tác & Đội Xe</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script type="module">
    // ---- All app code runs as an ES module ----
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getFirestore, collection, doc, setDoc, addDoc, onSnapshot,
      deleteDoc, updateDoc, query, orderBy
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import {
      getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    // date-fns via esm.sh
    import {
      format, addMonths, subMonths, startOfMonth, endOfMonth,
      startOfWeek, endOfWeek, eachDayOfInterval, isSameMonth,
      isSameDay, parseISO, isWithinInterval, addDays, nextDay,
      getDay, isBefore, isValid
    } from 'https://esm.sh/date-fns@3.6.0';
    import { vi } from 'https://esm.sh/date-fns@3.6.0/locale/vi';

    // React + ReactDOM via esm.sh
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18';
    import ReactDOM from 'https://esm.sh/react-dom@18/client';

    // lucide-react via esm.sh
    import {
      ChevronLeft, ChevronRight, Plus, Trash2, Edit2, Search,
      Settings, Car, MapPin, User, Calendar, AlertTriangle,
      CheckCircle2, X, CircleUserRound, UserCheck
    } from 'https://esm.sh/lucide-react@0.383.0';

    // ---- CONFIG & CONSTANTS ----
    const firebaseConfig = {
      apiKey: "AIzaSyCdVTxOAGVYHV5W7zsXyK7RGxSlX19gpSI",
      authDomain: "dangkycongtac-3eb8a.firebaseapp.com",
      projectId: "dangkycongtac-3eb8a",
      storageBucket: "dangkycongtac-3eb8a.firebasestorage.app",
      messagingSenderId: "453381431200",
      appId: "1:453381431200:web:89c9be0564a7575a068ec5",
      measurementId: "G-PZ62B9F89S"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const appId = 'it-dept-schedule-v2';

    const ADMIN_PASS = "123456";

    const DriverIcon = ({ size = 16, className = "" }) =>
      React.createElement('svg', {
        width: size, height: size, viewBox: "0 0 24 24", fill: "none",
        stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round",
        strokeLinejoin: "round", className
      },
        React.createElement('circle', { cx: "12", cy: "12", r: "10" }),
        React.createElement('path', { d: "M12 2a10 10 0 0 0-10 10" }),
        React.createElement('path', { d: "M12 12l-5.5 8" }),
        React.createElement('path', { d: "M12 12l5.5 8" }),
        React.createElement('path', { d: "M12 12V2" }),
        React.createElement('circle', { cx: "12", cy: "12", r: "2" })
      );

    const EMPLOYEES = [
      "Cường", "Duy", "Dương", "Đoàn Minh Lý", "Hải", "Huy", "Kha", "Lũy", "Lượng",
      "Nguyễn Văn Lý", "Nhựt", "Phương", "Quy", "Sang", "Sơn", "Thành", "Thất",
      "Thiện", "Thủy", "Trung", "Trương", "Trường", "Việt"
    ].sort((a, b) => a.localeCompare(b, 'vi'));

    const VEHICLE_TYPES = {
      'BT': { name: 'Bán tải', limit: 4 },
      'NM': { name: 'Kia Nhà máy', limit: 1 },
      'KB': { name: 'Kia Bình Tân', limit: 1 },
      'VN': { name: 'Xe Van', limit: 1 },
      'self': { name: 'Tự túc', limit: Infinity },
      'other': { name: 'Khác', limit: Infinity }
    };

    const COLORS = [
      '#E53935','#8E24AA','#1E88E5','#00897B','#43A047',
      '#FB8C00','#6D4C41','#00ACC1','#3949AB','#D81B60',
      '#F4511E','#7CB342','#039BE5','#8D6E63','#5E35B1',
      '#00BFA5','#C0CA33','#FF7043','#26A69A','#AB47BC',
      '#FDD835','#29B6F6'
    ];

    const NATIONAL_HOLIDAYS_2026 = {
      '2026-01-01': 'Tết Dương lịch', '2026-01-28': 'Tết Nguyên Đán', '2026-01-29': 'Tết Nguyên Đán',
      '2026-01-30': 'Tết Nguyên Đán', '2026-01-31': 'Tết Nguyên Đán', '2026-02-01': 'Tết Nguyên Đán',
      '2026-02-02': 'Tết Nguyên Đán', '2026-02-03': 'Tết Nguyên Đán', '2026-04-26': 'Giỗ Tổ Hùng Vương',
      '2026-04-27': 'Nghỉ bù Giỗ Tổ', '2026-04-30': 'Ngày Giải Phóng', '2026-05-01': 'Quốc tế Lao Động',
      '2026-09-02': 'Quốc khánh', '2026-09-03': 'Nghỉ bù Quốc khánh',
    };

    const DESTINATIONS = {
      'MIỀN TÂY': ["An Giang", "Bạc Liêu", "Bến Tre", "Cà Mau", "Cần Thơ", "Đồng Tháp", "Hậu Giang", "Kiên Giang", "Long An", "Sóc Trăng", "Tiền Giang", "Trà Vinh", "Vĩnh Long"].sort((a,b)=>a.localeCompare(b,'vi')),
      'MIỀN ĐÔNG': ["Bà Rịa - Vũng Tàu", "Bình Dương", "Bình Phước", "Đồng Nai", "Tây Ninh", "Lâm Đồng"].sort((a,b)=>a.localeCompare(b,'vi')),
      'MIỀN TRUNG': ["Bình Định", "Bình Thuận", "Đà Nẵng", "Hà Tĩnh", "Khánh Hoà", "Nghệ An", "Ninh Thuận", "Phú Yên", "Quảng Bình", "Quảng Nam", "Quảng Ngãi", "Quảng Trị", "Thừa Thiên Huế"].sort((a,b)=>a.localeCompare(b,'vi')),
      'KHÁC': ["Hà Nội", "TP. Hồ Chí Minh", "Khác (tự nhập)"]
    };

    // ---- UTILS ----
    const normalizeName = (name) => name ? name.trim().toLowerCase() : "";
    const getEmployeeColor = (name, customColors = {}) => {
      const norm = normalizeName(name);
      if (customColors[norm]) return customColors[norm];
      const idx = EMPLOYEES.indexOf(name);
      if (idx !== -1) return COLORS[idx % COLORS.length];
      return '#94a3b8';
    };

    // ---- APP COMPONENT ----
    function App() {
      const [user, setUser] = useState(null);
      const [currentMonth, setCurrentMonth] = useState(new Date(2026, 3, 1));
      const [schedules, setSchedules] = useState([]);
      const [companyHolidays, setCompanyHolidays] = useState([]);
      const [employeeColors, setEmployeeColors] = useState({});
      const [editingId, setEditingId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('business');
      const [searchQuery, setSearchQuery] = useState("");
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [deleteConfirmation, setDeleteConfirmation] = useState(null);
      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [viewingItem, setViewingItem] = useState(null);


      const [formData, setFormData] = useState({
        employeeName: '', customEmployee: '', destination: '', customDestination: '',
        vehicle: '', vehicleNote: '', hasDriver: false,
        startDate: format(new Date(2026, 3, 1), 'yyyy-MM-dd'), endDate: '',
        eventName: '', eventDesc: '', eventColor: '#1E88E5'
      });

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); }
          catch (err) { console.error("Auth error", err); }
        };
        initAuth();
        return onAuthStateChanged(auth, setUser);
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubSchedules = onSnapshot(
          query(collection(db, 'artifacts', appId, 'public', 'data', 'schedules')),
          (snap) => { setSchedules(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); },
          (err) => console.error("Schedule load error", err)
        );
        const unsubHolidays = onSnapshot(
          query(collection(db, 'artifacts', appId, 'public', 'data', 'company_holidays')),
          (snap) => setCompanyHolidays(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (err) => console.error("Holiday load error", err)
        );
        const unsubColors = onSnapshot(
          query(collection(db, 'artifacts', appId, 'public', 'data', 'employee_colors')),
          (snap) => {
            const mapping = {};
            snap.docs.forEach(d => mapping[d.id] = d.data().color);
            setEmployeeColors(mapping);
          },
          (err) => console.error("Colors load error", err)
        );
        return () => { unsubSchedules(); unsubHolidays(); unsubColors(); };
      }, [user]);

      const calculateDefaultEndDate = (startDateStr) => {
        if (!startDateStr) return "";
        const start = parseISO(startDateStr);
        if (!isValid(start)) return "";
        const dayOfWeek = getDay(start);
        if (dayOfWeek === 6 || dayOfWeek === 0) return startDateStr;
        return format(nextDay(start, 6), 'yyyy-MM-dd');
      };

      useEffect(() => {
        if (!editingId) setFormData(prev => ({ ...prev, endDate: calculateDefaultEndDate(prev.startDate) }));
      }, [formData.startDate, editingId]);

      const showToast = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleRegister = async (e) => {
        if (e) e.preventDefault();
        if (!user) return;
        const { employeeName, customEmployee, destination, customDestination, vehicle, vehicleNote, hasDriver, startDate, endDate, eventName, eventColor } = formData;
        const finalEmployee = employeeName === 'Khác (Tự nhập)' ? customEmployee : employeeName;
        const finalDest = destination === 'Khác (tự nhập)' ? customDestination : destination;
        if (activeTab === 'business') {
          if (!finalEmployee || !finalDest || !vehicle || !startDate || !endDate) return showToast("Vui lòng nhập đầy đủ thông tin", "error");
        } else {
          if (!eventName || !startDate || !endDate) return showToast("Vui lòng nhập tên sự kiện và ngày", "error");
        }
        if (isBefore(parseISO(endDate), parseISO(startDate))) return showToast("Ngày kết thúc không được nhỏ hơn ngày bắt đầu", "error");
        if (activeTab === 'business') {
          const hasConflict = schedules.some(s => s.type === 'business' && normalizeName(s.employeeName) === normalizeName(finalEmployee) && s.id !== editingId && s.startDate <= endDate && s.endDate >= startDate);
          if (hasConflict) return setConfirmDialog({ title: "Trùng lịch nhân viên", message: `Nhân viên ${finalEmployee} đã có lịch công tác trong khoảng ngày này.`, type: 'error' });
        }
        const datesInRange = eachDayOfInterval({ start: parseISO(startDate), end: parseISO(endDate) }).map(d => format(d, 'yyyy-MM-dd'));
        const foundHolidays = datesInRange.filter(d => NATIONAL_HOLIDAYS_2026[d] || companyHolidays.some(ch => d >= ch.startDate && d <= ch.endDate));
        if (foundHolidays.length > 0 && !formData.confirmedHoliday) {
          return setConfirmDialog({
            title: "Cảnh báo ngày nghỉ",
            message: `Lịch có chứa ngày nghỉ: ${foundHolidays.map(d => NATIONAL_HOLIDAYS_2026[d] || "Nghỉ công ty").join(", ")}. Vẫn muốn tiếp tục?`,
            type: 'warning',
            onConfirm: () => {
              setFormData(prev => ({ ...prev, confirmedHoliday: true }));
              setConfirmDialog(null);
              setTimeout(() => handleRegister(), 100);
            }
          });
        }
        if (activeTab === 'business' && !['self', 'other'].includes(vehicle)) {
          for (let day of datesInRange) {
            const used = schedules.filter(s => s.type === 'business' && s.vehicle === vehicle && s.id !== editingId && s.startDate <= day && s.endDate >= day).length;
            if (used >= VEHICLE_TYPES[vehicle].limit) return setConfirmDialog({ title: "Hết xe", message: `Xe ${VEHICLE_TYPES[vehicle].name} đã hết vào ngày ${day}.`, type: 'error' });
          }
        }
        try {
          const payload = {
            type: activeTab, startDate, endDate, createdAt: new Date().toISOString(),
            ...(activeTab === 'business'
              ? { employeeName: finalEmployee, destination: finalDest, vehicle, vehicleNote, hasDriver, color: getEmployeeColor(finalEmployee, employeeColors) }
              : { eventName, eventDesc: formData.eventDesc, color: eventColor })
          };
          if (editingId) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', editingId), payload);
            showToast("Cập nhật thành công!");
          } else {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), payload);
            showToast("Đăng ký thành công!");
          }
          if (activeTab === 'business' && employeeName === 'Khác (Tự nhập)')
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employee_colors', normalizeName(customEmployee)), { color: payload.color });
          resetForm();
        } catch (err) { showToast("Lỗi khi lưu dữ liệu", "error"); }
      };

      const resetForm = () => {
        setFormData({
          employeeName: '', customEmployee: '', destination: '', customDestination: '',
          vehicle: '', vehicleNote: '', hasDriver: false,
          startDate: format(currentMonth, 'yyyy-MM-dd'), endDate: calculateDefaultEndDate(format(currentMonth, 'yyyy-MM-dd')),
          eventName: '', eventDesc: '', eventColor: '#1E88E5', confirmedHoliday: false
        });
        setEditingId(null);
      };

    const handleEditWithAuth = (item) => {
        const pass = prompt("Nhập mật khẩu Admin để chỉnh sửa:");
        if (pass !== ADMIN_PASS) { if (pass !== null) showToast("Sai mật khẩu Admin", "error"); return; }
        setViewingItem(null);
        setActiveTab(item.type);
        setEditingId(item.id);
        if (item.type === 'business') {
          const isCustomEmp = !EMPLOYEES.includes(item.employeeName);
          const isCustomDest = !Object.values(DESTINATIONS).flat().includes(item.destination);
          setFormData({
            ...formData,
            employeeName: isCustomEmp ? 'Khác (Tự nhập)' : item.employeeName,
            customEmployee: isCustomEmp ? item.employeeName : '',
            destination: isCustomDest ? 'Khác (tự nhập)' : item.destination,
            customDestination: isCustomDest ? item.destination : '',
            vehicle: item.vehicle, vehicleNote: item.vehicleNote || '', hasDriver: item.hasDriver || false,
            startDate: item.startDate, endDate: item.endDate
          });
        } else {
          setFormData({ ...formData, eventName: item.eventName, eventDesc: item.eventDesc || '', eventColor: item.color, startDate: item.startDate, endDate: item.endDate });
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const confirmDelete = async () => {
        if (deleteConfirmation.password === ADMIN_PASS) {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', deleteConfirmation.id));
          showToast("Đã xóa lịch");
          setDeleteConfirmation(null);
        } else {
          showToast("Sai mật khẩu Admin", "error");
        }
      };

      const calendarDays = useMemo(() => {
        const start = startOfWeek(startOfMonth(currentMonth), { weekStartsOn: 1 });
        const end = endOfWeek(endOfMonth(currentMonth), { weekStartsOn: 1 });
        const days = eachDayOfInterval({ start, end });
        while (days.length < 42) days.push(addDays(days[days.length - 1], 1));
        return days;
      }, [currentMonth]);

      const slotOrder = useMemo(() => {
        const monthSchedules = schedules.filter(s => {
          const mStart = startOfMonth(currentMonth);
          const mEnd = endOfMonth(currentMonth);
          return (parseISO(s.startDate) <= mEnd && parseISO(s.endDate) >= mStart);
        }).sort((a, b) => a.startDate.localeCompare(b.startDate) || (a.createdAt || '').localeCompare(b.createdAt || ''));
        const mapping = {};
        monthSchedules.forEach((s, i) => mapping[s.id] = i);
        return mapping;
      }, [schedules, currentMonth]);

      const filteredHistory = useMemo(() => {
        const monthStr = format(currentMonth, 'yyyy-MM');
        return schedules.filter(s => s.startDate.startsWith(monthStr)).filter(s => {
          const term = searchQuery.toLowerCase();
          return s.type === 'business'
            ? (s.employeeName.toLowerCase().includes(term) || s.destination.toLowerCase().includes(term))
            : (s.eventName?.toLowerCase().includes(term));
        }).sort((a, b) => b.startDate.localeCompare(a.startDate));
      }, [schedules, currentMonth, searchQuery]);

      const e = React.createElement;

      return e('div', { className: "min-h-screen bg-slate-50 text-slate-900 font-sans pb-12" },

        // Toast
        toast && e('div', { className: `fixed top-4 right-4 z-[100] px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 ${toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'} text-white` },
          e(toast.type === 'error' ? AlertTriangle : CheckCircle2, { size: 20 }),
          toast.msg
        ),

        // Delete Modal
        deleteConfirmation && e('div', { className: "fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4" },
          e('div', { className: "bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 text-center" },
            e('div', { className: "w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4" },
              e(Trash2, { size: 32 })
            ),
            e('h3', { className: "text-xl font-bold mb-2" }, "Xác nhận xóa"),
            e('p', { className: "text-slate-500 text-sm mb-6" }, "Nhập mật khẩu Admin để hoàn tất thao tác này."),
            e('input', {
              type: "password",
              placeholder: "Mật khẩu Admin...",
              autoFocus: true,
              className: "w-full p-3 border rounded-lg mb-4 text-center text-lg tracking-widest outline-none focus:ring-2 focus:ring-red-500",
              onKeyDown: (ev) => ev.key === 'Enter' && confirmDelete(),
              onChange: (ev) => setDeleteConfirmation({ ...deleteConfirmation, password: ev.target.value })
            }),
            e('div', { className: "flex gap-3" },
              e('button', { onClick: () => setDeleteConfirmation(null), className: "flex-1 py-3 font-bold text-slate-500 hover:bg-slate-100 rounded-lg" }, "HỦY"),
              e('button', { onClick: confirmDelete, className: "flex-1 py-3 font-bold bg-red-600 text-white hover:bg-red-700 rounded-lg" }, "XÓA")
            )
          )
        ),

        // View Item Popup
        viewingItem && e('div', { className: "fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4" },
          e('div', { className: "bg-white rounded-xl shadow-2xl max-w-sm w-full overflow-hidden" },
            e('div', { className: "p-4 text-white font-bold text-lg flex justify-between items-center", style: { backgroundColor: viewingItem.color } },
              e('span', null, viewingItem.type === 'business' ? viewingItem.employeeName : viewingItem.eventName),
              e('button', { onClick: () => setViewingItem(null), className: "p-1 hover:bg-white/20 rounded" }, e(X, null))
            ),
            e('div', { className: "p-6 space-y-3 text-sm" },
              viewingItem.type === 'business'
                ? e(React.Fragment, null,
                    e('div', { className: "flex justify-between" }, e('span', { className: "text-slate-400" }, "Điểm đến"), e('span', { className: "font-bold" }, viewingItem.destination)),
                    e('div', { className: "flex justify-between" }, e('span', { className: "text-slate-400" }, "Xe"), e('span', { className: "font-bold" }, VEHICLE_TYPES[viewingItem.vehicle]?.name)),
                    e('div', { className: "flex justify-between" }, e('span', { className: "text-slate-400" }, "Tài xế"), e('span', { className: "font-bold" }, viewingItem.hasDriver ? "Có tài xế" : "Tự lái")),
                    e('div', { className: "flex justify-between" }, e('span', { className: "text-slate-400" }, "Lịch"), e('span', { className: "font-bold" }, `${viewingItem.startDate} → ${viewingItem.endDate}`))
                  )
                : e(React.Fragment, null,
                    e('div', { className: "flex justify-between" }, e('span', { className: "text-slate-400" }, "Lịch"), e('span', { className: "font-bold" }, `${viewingItem.startDate} → ${viewingItem.endDate}`)),
                    viewingItem.eventDesc && e('div', { className: "flex justify-between" }, e('span', { className: "text-slate-400" }, "Ghi chú"), e('span', { className: "font-bold" }, viewingItem.eventDesc))
                  )
            ),
            e('div', { className: "p-4 bg-slate-50 flex justify-end gap-3" },
              e('button', { onClick: () => setViewingItem(null), className: "px-4 py-2 rounded-lg hover:bg-slate-200" }, "Đóng"),
              e('button', { onClick: () => handleEditWithAuth(viewingItem), className: "px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 font-bold flex items-center gap-2" }, e(Edit2, { size: 14 }), "Chỉnh sửa")
            )
          )
        ),
        confirmDialog && e('div', { className: "fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4" },
          e('div', { className: "bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden" },
            e('div', { className: `p-4 flex items-center gap-3 text-white ${confirmDialog.type === 'error' ? 'bg-red-500' : 'bg-amber-500'}` },
              e(AlertTriangle, { size: 24 }),
              e('h3', { className: "font-bold text-lg" }, confirmDialog.title)
            ),
            e('div', { className: "p-6 text-slate-600" }, confirmDialog.message),
            e('div', { className: "p-4 bg-slate-50 flex justify-end gap-3" },
              e('button', { onClick: () => setConfirmDialog(null), className: "px-4 py-2 rounded-lg hover:bg-slate-200 transition-colors" }, "Đóng"),
              confirmDialog.onConfirm && e('button', { onClick: confirmDialog.onConfirm, className: "px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700" }, "Tiếp tục")
            )
          )
        ),

        // Header
        e('header', { className: "bg-white border-b sticky top-0 z-30 shadow-sm" },
          e('div', { className: "max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between" },
            e('div', { className: "flex items-center gap-4" },
              e(Calendar, { className: "text-blue-600", size: 28 }),
              e('h1', { className: "text-xl font-black tracking-tight hidden sm:block uppercase" }, "Lịch Công Tác & Đội Xe")
            ),
            e('div', { className: "flex items-center gap-2 bg-slate-100 p-1 rounded-lg" },
              e('button', { onClick: () => setCurrentMonth(subMonths(currentMonth, 1)), className: "p-2 hover:bg-white rounded-md" },
                e(ChevronLeft, { size: 20 })
              ),
              e('div', { className: "px-4 font-bold text-lg min-w-[160px] text-center uppercase" },
                format(currentMonth, 'MMMM / yyyy', { locale: vi })
              ),
              e('button', { onClick: () => setCurrentMonth(addMonths(currentMonth, 1)), className: "p-2 hover:bg-white rounded-md" },
                e(ChevronRight, { size: 20 })
              )
            ),

  <script>
    const APP_PASS = "1357911";
    const SESSION_KEY = "atk_auth";

    function checkLogin() {
      if (sessionStorage.getItem(SESSION_KEY) === "ok") showApp();
    }

    function showApp() {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('root').style.display = 'block';
    }

    function tryLogin() {
      const val = document.getElementById('pass-input').value;
      if (val === APP_PASS) {
        sessionStorage.setItem(SESSION_KEY, "ok");
        showApp();
      } else {
        const input = document.getElementById('pass-input');
        const err = document.getElementById('login-error');
        input.classList.add('error');
        err.textContent = "Sai mật khẩu, thử lại!";
        input.value = '';
        setTimeout(() => { input.classList.remove('error'); err.textContent = ''; }, 1500);
      }
    }

    window.addEventListener('DOMContentLoaded', checkLogin);
  </script>

      <input id="pass-input" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') tryLogin()" autofocus />
      <button onclick="tryLogin()">Đăng nhập</button>
      <div id="login-error"></div>
