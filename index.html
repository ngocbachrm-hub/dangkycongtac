<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Lịch Công Tác & Đội Xe</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/locale/vi/index.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        input[type="date"]::-webkit-inner-spin-button,
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        window.FirebaseLib = { initializeApp, getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc, updateDoc, query, orderBy, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { 
            format, addMonths, subMonths, startOfMonth, endOfMonth, 
            startOfWeek, endOfWeek, eachDayOfInterval, isSameMonth, 
            isSameDay, parseISO, isWithinInterval, addDays, nextDay, 
            getDay, isBefore, isValid 
        } = window.dateFns;
        const viLocale = window.dateFns.locale.vi;

        // Icons components
        const LucideIcon = ({ name, size = 16, className = "" }) => {
            const Icon = lucide[name] || lucide.HelpCircle;
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const DriverIcon = ({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10" /><path d="M12 2a10 10 0 0 0-10 10" /><path d="M12 12l-5.5 8" /><path d="M12 12l5.5 8" /><path d="M12 12V2" /><circle cx="12" cy="12" r="2" />
            </svg>
        );

        // --- CONFIG & CONSTANTS ---
        const firebaseConfig = {
            apiKey: "AIzaSyCdVTxOAGVYHV5W7zsXyK7RGxSlX19gpSI",
            authDomain: "dangkycongtac-3eb8a.firebaseapp.com",
            projectId: "dangkycongtac-3eb8a",
            storageBucket: "dangkycongtac-3eb8a.firebasestorage.app",
            messagingSenderId: "453381431200",
            appId: "1:453381431200:web:89c9be0564a7575a068ec5"
        };

        const EMPLOYEES = ["Cường", "Duy", "Dương", "Đoàn Minh Lý", "Hải", "Huy", "Kha", "Lũy", "Lượng", "Nguyễn Văn Lý", "Nhựt", "Phương", "Quy", "Sang", "Sơn", "Thành", "Thất", "Thiện", "Thủy", "Trung", "Trương", "Trường", "Việt"].sort((a, b) => a.localeCompare(b, 'vi'));
        const VEHICLE_TYPES = { 'BT': { name: 'Bán tải', limit: 4 }, 'NM': { name: 'Kia Nhà máy', limit: 1 }, 'KB': { name: 'Kia Bình Tân', limit: 1 }, 'VN': { name: 'Xe Van', limit: 1 }, 'self': { name: 'Tự túc', limit: Infinity }, 'other': { name: 'Khác', limit: Infinity } };
        const COLORS = ['#E53935','#8E24AA','#1E88E5','#00897B','#43A047','#FB8C00','#6D4C41','#00ACC1','#3949AB','#D81B60','#F4511E','#7CB342','#039BE5','#8D6E63','#5E35B1','#00BFA5','#C0CA33','#FF7043','#26A69A','#AB47BC','#FDD835','#29B6F6'];
        const NATIONAL_HOLIDAYS_2026 = { '2026-01-01': 'Tết Dương lịch', '2026-01-28': 'Tết Nguyên Đán', '2026-04-30': 'Ngày Giải Phóng', '2026-05-01': 'Quốc tế Lao Động', '2026-09-02': 'Quốc khánh' };
        const DESTINATIONS = { 'MIỀN TÂY': ["An Giang", "Cần Thơ", "Long An", "Tiền Giang", "Vĩnh Long"], 'MIỀN ĐÔNG': ["Bình Dương", "Đồng Nai", "Vũng Tàu"], 'KHÁC': ["TP. Hồ Chí Minh", "Khác (tự nhập)"] };

        const ADMIN_PASS = "123456";
        const appId = 'it-dept-schedule-v2';

        function App() {
            const [user, setUser] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(new Date(2026, 3, 1));
            const [schedules, setSchedules] = useState([]);
            const [companyHolidays, setCompanyHolidays] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [activeTab, setActiveTab] = useState('business');
            const [searchQuery, setSearchQuery] = useState("");
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [deleteConfirmation, setDeleteConfirmation] = useState(null);
            const [toast, setToast] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            const [formData, setFormData] = useState({
                employeeName: '', customEmployee: '', destination: '', customDestination: '',
                vehicle: '', vehicleNote: '', hasDriver: false,
                startDate: '2026-04-01', endDate: '2026-04-01',
                eventName: '', eventDesc: '', eventColor: '#1E88E5'
            });

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, onSnapshot, query, collection, doc } = window.FirebaseLib;
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);

                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, setUser);

                if (db) {
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'schedules')), (snap) => {
                        setSchedules(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        setTimeout(() => lucide.createIcons(), 100);
                    });
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'company_holidays')), (snap) => {
                        setCompanyHolidays(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, schedules, currentMonth]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleRegister = async (e) => {
                if (e) e.preventDefault();
                const { getFirestore, collection, addDoc, updateDoc, doc } = window.FirebaseLib;
                const db = getFirestore();

                const finalEmployee = formData.employeeName === 'Khác (Tự nhập)' ? formData.customEmployee : formData.employeeName;
                const finalDest = formData.destination === 'Khác (tự nhập)' ? formData.customDestination : formData.destination;

                const payload = {
                    type: activeTab,
                    startDate: formData.startDate,
                    endDate: formData.endDate,
                    createdAt: new Date().toISOString(),
                    ...(activeTab === 'business' ? {
                        employeeName: finalEmployee,
                        destination: finalDest,
                        vehicle: formData.vehicle,
                        hasDriver: formData.hasDriver,
                        color: COLORS[EMPLOYEES.indexOf(finalEmployee) % COLORS.length] || '#94a3b8'
                    } : {
                        eventName: formData.eventName,
                        eventDesc: formData.eventDesc,
                        color: formData.eventColor
                    })
                };

                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', editingId), payload);
                        showToast("Cập nhật thành công!");
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), payload);
                        showToast("Đăng ký thành công!");
                    }
                    setEditingId(null);
                    setFormData(prev => ({ ...prev, employeeName: '', eventName: '' }));
                } catch (err) {
                    showToast("Lỗi hệ thống", "error");
                }
            };

            const calendarDays = useMemo(() => {
                const start = startOfWeek(startOfMonth(currentMonth), { weekStartsOn: 1 });
                const end = endOfWeek(endOfMonth(currentMonth), { weekStartsOn: 1 });
                return eachDayOfInterval({ start, end });
            }, [currentMonth]);

            return (
                <div className="min-h-screen pb-12">
                    {/* Toast */}
                    {toast && (
                        <div className={`fixed top-4 right-4 z-[100] px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 bg-slate-800 text-white`}>
                            {toast.msg}
                        </div>
                    )}

                    <header className="bg-white border-b sticky top-0 z-30 shadow-sm h-16 flex items-center justify-between px-6">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg text-white"><LucideIcon name="Calendar" size={20}/></div>
                            <h1 className="font-black uppercase tracking-tight">IT Schedule 2026</h1>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setCurrentMonth(subMonths(currentMonth, 1))} className="p-2 hover:bg-white rounded-md"><LucideIcon name="ChevronLeft" /></button>
                            <div className="px-4 font-bold uppercase text-sm">{format(currentMonth, 'MMMM / yyyy', { locale: viLocale })}</div>
                            <button onClick={() => setCurrentMonth(addMonths(currentMonth, 1))} className="p-2 hover:bg-white rounded-md"><LucideIcon name="ChevronRight" /></button>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto p-4 flex flex-col md:flex-row gap-6">
                        {/* Sidebar Form */}
                        <div className="w-full md:w-[350px] shrink-0">
                            <div className="bg-white rounded-xl border shadow-sm overflow-hidden sticky top-20">
                                <div className="flex border-b">
                                    <button onClick={() => setActiveTab('business')} className={`flex-1 py-4 font-bold text-xs ${activeTab === 'business' ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'}`}>CÔNG TÁC</button>
                                    <button onClick={() => setActiveTab('event')} className={`flex-1 py-4 font-bold text-xs ${activeTab === 'event' ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'}`}>SỰ KIỆN</button>
                                </div>
                                <form onSubmit={handleRegister} className="p-5 space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase">Nhân viên / Sự kiện</label>
                                        {activeTab === 'business' ? (
                                            <select value={formData.employeeName} onChange={e => setFormData({...formData, employeeName: e.target.value})} className="w-full mt-1 p-2 bg-slate-50 border rounded-lg outline-none text-sm">
                                                <option value="">Chọn...</option>
                                                {EMPLOYEES.map(e => <option key={e} value={e}>{e}</option>)}
                                            </select>
                                        ) : (
                                            <input value={formData.eventName} onChange={e => setFormData({...formData, eventName: e.target.value})} className="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-sm" placeholder="Tên sự kiện..." />
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Từ ngày</label>
                                            <input type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-sm" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Đến ngày</label>
                                            <input type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-sm" />
                                        </div>
                                    </div>
                                    {activeTab === 'business' && (
                                        <>
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase">Điểm đến</label>
                                                <select value={formData.destination} onChange={e => setFormData({...formData, destination: e.target.value})} className="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-sm">
                                                    <option value="">Chọn...</option>
                                                    {Object.entries(DESTINATIONS).map(([g, items]) => (
                                                        <optgroup label={g} key={g}>{items.map(i => <option key={i} value={i}>{i}</option>)}</optgroup>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase">Phương tiện</label>
                                                <select value={formData.vehicle} onChange={e => setFormData({...formData, vehicle: e.target.value})} className="w-full mt-1 p-2 bg-slate-50 border rounded-lg text-sm">
                                                    {Object.entries(VEHICLE_TYPES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                                                </select>
                                            </div>
                                        </>
                                    )}
                                    <button className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-100 hover:bg-blue-700">
                                        {editingId ? "CẬP NHẬT" : "ĐĂNG KÝ NGAY"}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Calendar */}
                        <div className="flex-1 space-y-6">
                            <div className="bg-white border rounded-xl shadow-sm overflow-hidden">
                                <div className="calendar-grid bg-slate-900 text-[10px] text-white font-bold text-center py-2">
                                    {['T2','T3','T4','T5','T6','T7','CN'].map(d => <div key={d}>{d}</div>)}
                                </div>
                                <div className="calendar-grid auto-rows-[120px]">
                                    {calendarDays.map((day, idx) => {
                                        const dayStr = format(day, 'yyyy-MM-dd');
                                        const isCurr = isSameMonth(day, currentMonth);
                                        const daySchedules = schedules.filter(s => dayStr >= s.startDate && dayStr <= s.endDate);
                                        
                                        return (
                                            <div key={idx} className={`border-b border-r p-1 ${!isCurr ? 'bg-slate-50 opacity-30' : ''}`}>
                                                <div className="text-xs font-bold text-slate-400 mb-1">{format(day, 'd')}</div>
                                                <div className="space-y-1">
                                                    {daySchedules.map(s => (
                                                        <div 
                                                            key={s.id} 
                                                            onClick={() => { setEditingId(s.id); setFormData(s); }}
                                                            className="text-[9px] text-white px-1 py-0.5 rounded truncate cursor-pointer hover:opacity-80"
                                                            style={{ backgroundColor: s.color }}
                                                        >
                                                            {s.employeeName || s.eventName}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Admin Trigger */}
                    <button 
                        onClick={() => { if(prompt("Pass:") === ADMIN_PASS) alert("Admin Mode On"); }}
                        className="fixed bottom-6 right-6 w-12 h-12 bg-slate-800 text-white rounded-full flex items-center justify-center shadow-xl"
                    >
                        <LucideIcon name="Settings" />
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
